# Fly.io deployment config for the OpenHelm Worker Service.
# Deploy: fly deploy --config worker/fly.toml
# Secrets: fly secrets set SUPABASE_URL=... SUPABASE_SERVICE_KEY=... etc.

app = "openhelm-worker"
primary_region = "lhr"  # London — co-located with EU Supabase region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  TICK_INTERVAL_MS = "60000"
  MAX_CONCURRENT_RUNS_PER_USER = "2"
  SANDBOX_TIMEOUT_MS = "1800000"
  E2B_TEMPLATE_ID = "openhelm-goose"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # Always-on; never idle-shutdown
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/health"
    port = 8080
    timeout = "10s"
    type = "http"

# ── Deployment strategy ────────────────────────────────────────────────────────
# Rolling deploy with canary to avoid dropping in-flight runs
[deploy]
  strategy = "rolling"

# ── Metrics (Fly built-in Prometheus scraping) ────────────────────────────────
# View in: fly dashboard → Metrics
[metrics]
  port = 9091
  path = "/metrics"
