name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress CI for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type-check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

  build-check:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build agent sidecar
        run: |
          cd agent && npm run build
          mkdir -p ../src-tauri/binaries
          cp dist/agent.js ../src-tauri/binaries/agent-aarch64-apple-darwin

      - name: Bundle native modules for Tauri resources
        run: |
          mkdir -p src-tauri/bundled-node-modules
          for pkg in better-sqlite3 bindings file-uri-to-path; do
            if [ -d "node_modules/$pkg" ]; then
              cp -r "node_modules/$pkg" "src-tauri/bundled-node-modules/$pkg"
            fi
          done

      - name: Check Rust compilation
        run: cd src-tauri && cargo check
